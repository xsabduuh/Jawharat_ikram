<div class="page active" id="page-contact" style="padding-top:70px">
<style>
.contact-hero{background:linear-gradient(135deg,#fff5f9,#fdf0f5);padding:70px 20px 50px;text-align:center;border-bottom:1px solid #f2d8e4}
.contact-hero h1{font-size:clamp(26px,5vw,40px);font-weight:900;color:#3a2430;margin-bottom:12px}
.contact-hero h1 span{color:#e07898}
.contact-hero p{font-size:15px;color:#7a5a68;max-width:500px;margin:0 auto;line-height:1.7}
.contact-wrap{max-width:900px;margin:0 auto;padding:60px 20px}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
.contact-info-card{background:#fff;border:1px solid #f2d8e4;border-radius:24px;padding:32px;box-shadow:0 4px 20px rgba(240,160,192,.12)}
.contact-form-card{background:#fff;border:1px solid #f2d8e4;border-radius:24px;padding:32px;box-shadow:0 4px 20px rgba(240,160,192,.12)}
.card-title{font-size:20px;font-weight:800;color:#3a2430;margin-bottom:24px;display:flex;align-items:center;gap:8px}
.contact-method{display:flex;align-items:flex-start;gap:14px;padding:16px 0;border-bottom:1px solid #f2d8e4}
.contact-method:last-child{border-bottom:none}
.method-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.method-icon.wa{background:#e8f8ee;color:#25D366}
.method-icon.phone{background:#fff0f5;color:#e07898}
.method-icon.ig{background:#fce8f0;color:#E1306C}
.method-icon.email{background:#f0f5ff;color:#4a7aff}
.method-label{font-size:12px;font-weight:600;color:#b89aaa;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.method-value{font-size:14px;font-weight:700;color:#3a2430;line-height:1.5}
.method-value a{color:#e07898;text-decoration:none}
.method-value a:hover{text-decoration:underline}
.form-group{margin-bottom:16px}
.form-group label{font-size:13px;font-weight:600;color:#7a5a68;display:block;margin-bottom:6px}
.form-group input,.form-group textarea{
  width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid #f2d8e4;
  font-family:inherit;font-size:14px;color:#3a2430;background:#fff5f9;
  transition:all .3s;resize:vertical;
}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#e07898;background:#fff;box-shadow:0 0 0 3px rgba(224,120,152,.1)}
.form-group textarea{min-height:110px}
.submit-btn{
  width:100%;background:linear-gradient(135deg,#e07898,#f0a0c0);color:#fff;
  padding:13px;border-radius:40px;font-size:15px;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;transition:all .3s;
  display:flex;align-items:center;justify-content:center;gap:8px;min-height:48px;
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(224,120,152,.4)}
.hours-table{width:100%;border-collapse:collapse;margin-top:14px;font-size:14px}
.hours-table td{padding:7px 0;color:#7a5a68;border-bottom:1px dashed #f2d8e4}
.hours-table td:last-child{text-align:left;font-weight:700;color:#3a2430}
.back-btn-contact{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#e07898,#f0a0c0);color:#fff;padding:11px 22px;border-radius:40px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .3s;margin-top:16px}
.back-btn-contact:hover{transform:translateY(-2px)}
@media(max-width:650px){.contact-grid{grid-template-columns:1fr}}
</style>

<div class="contact-hero">
  <span style="display:inline-block;background:#f8c8dc;color:#e07898;font-size:12px;font-weight:700;padding:4px 14px;border-radius:40px;margin-bottom:14px">تواصل معنا</span>
  <h1>نحن هنا <span>من أجلكِ</span></h1>
  <p>فريقنا جاهز للإجابة على جميع استفساراتكِ ومساعدتكِ في اختيار أجمل الأزياء</p>
  <button class="back-btn-contact" onclick="navigate('home')">
    <i class="fas fa-home" aria-hidden="true"></i> الرئيسية
  </button>
</div>

<div class="contact-wrap">
  <div class="contact-grid">
    <div>
      <div class="contact-info-card" style="margin-bottom:24px">
        <div class="card-title"><i class="fas fa-address-book" style="color:#e07898" aria-hidden="true"></i> معلومات التواصل</div>

        <div class="contact-method">
          <div class="method-icon wa"><i class="fab fa-whatsapp" aria-hidden="true"></i></div>
          <div>
            <div class="method-label">واتساب</div>
            <div class="method-value">
              <a href="https://wa.me/212727726891" target="_blank" rel="noopener noreferrer">+212 727-726891</a>
            </div>
          </div>
        </div>

        <div class="contact-method">
          <div class="method-icon phone"><i class="fas fa-phone-alt" aria-hidden="true"></i></div>
          <div>
            <div class="method-label">الهاتف</div>
            <div class="method-value">
              <a href="tel:+212727726891" dir="ltr">+212 727-726891</a>
            </div>
          </div>
        </div>

        <div class="contact-method">
          <div class="method-icon ig"><i class="fab fa-instagram" aria-hidden="true"></i></div>
          <div>
            <div class="method-label">إنستغرام</div>
            <div class="method-value">
              <a href="https://www.instagram.com/jawharat_ikram1" target="_blank" rel="noopener noreferrer">@jawharat_ikram1</a>
            </div>
          </div>
        </div>
      </div>

      <div class="contact-info-card">
        <div class="card-title"><i class="fas fa-clock" style="color:#e07898" aria-hidden="true"></i> ساعات العمل</div>
        <table class="hours-table" aria-label="جدول ساعات العمل">
          <tbody>
            <tr><td>السبت — الخميس</td><td>9:00 ص — 10:00 م</td></tr>
            <tr><td>الجمعة</td><td>2:00 م — 10:00 م</td></tr>
            <tr><td>واتساب</td><td>متاح دائماً 24/7</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="contact-form-card">
      <div class="card-title"><i class="fas fa-paper-plane" style="color:#e07898" aria-hidden="true"></i> أرسلي لنا رسالة</div>
      <form onsubmit="sendContactMessage(event)" novalidate>
        <div class="form-group">
          <label for="c-name">الاسم الكامل</label>
          <input type="text" id="c-name" placeholder="اسمكِ الكريم" autocomplete="name" required />
        </div>
        <div class="form-group">
          <label for="c-phone">رقم الهاتف</label>
          <input type="tel" id="c-phone" placeholder="0612345678" autocomplete="tel" dir="ltr" required />
        </div>
        <div class="form-group">
          <label for="c-subject">الموضوع</label>
          <input type="text" id="c-subject" placeholder="موضوع رسالتكِ" />
        </div>
        <div class="form-group">
          <label for="c-msg">الرسالة</label>
          <textarea id="c-msg" placeholder="اكتبي رسالتكِ هنا..." required></textarea>
        </div>
        <button type="submit" class="submit-btn">
          <i class="fab fa-whatsapp" aria-hidden="true"></i> إرسال عبر واتساب
        </button>
      </form>
    </div>
  </div>
</div>

<script>
function sendContactMessage(e) {
  e.preventDefault();
  var name    = document.getElementById('c-name').value.trim();
  var phone   = document.getElementById('c-phone').value.trim();
  var subject = document.getElementById('c-subject').value.trim();
  var msg     = document.getElementById('c-msg').value.trim();
  if (!name || !phone || !msg) { alert('يرجى ملء جميع الحقول المطلوبة'); return; }
  var text = '📩 رسالة جديدة من موقع جوهرة اكرام\n\n👤 الاسم: ' + name + '\n📞 الهاتف: ' + phone + (subject ? '\n📌 الموضوع: ' + subject : '') + '\n\n💬 الرسالة:\n' + msg;
  window.open('https://wa.me/212727726891?text=' + encodeURIComponent(text), '_blank');
}
</script>
</div>
